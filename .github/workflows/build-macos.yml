name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            target_arch: x86_64
          - os: macos-14
            arch: arm64
            target_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --target-arch "${{ matrix.target_arch }}" \
            --name "lctz_image-toolkit" \
            lctz_image_toolkit.py

      - name: Ad-hoc sign app
        run: |
          codesign --force --deep --sign - "dist/lctz_image-toolkit.app"

      - name: Zip app
        run: |
          ditto -c -k --keepParent "dist/lctz_image-toolkit.app" "lctz_image-toolkit-macos-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lctz_image-toolkit-macos-${{ matrix.arch }}
          path: lctz_image-toolkit-macos-${{ matrix.arch }}.zip
