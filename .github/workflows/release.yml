name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.01.2"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed `
            --exclude-module numpy `
            --exclude-module numpy.libs `
            --exclude-module PySide6.QtQml `
            --exclude-module PySide6.QtQuick `
            --exclude-module PySide6.QtNetwork `
            --exclude-module PySide6.QtOpenGL `
            --exclude-module PySide6.QtPdf `
            --exclude-module PySide6.QtVirtualKeyboard `
            --exclude-module PySide6.QtSvg `
            --exclude-module PySide6.QtTest `
            --exclude-module PySide6.QtWebEngineCore `
            --exclude-module PySide6.QtWebEngineWidgets `
            --exclude-module PIL.ImageQt `
            --exclude-module PIL.ImageTk `
            --exclude-module PIL.AvifImagePlugin `
            --name "lctz_image-toolkit" lctz_image_toolkit.py

      - name: Rename app
        run: |
          Move-Item -Path "dist\lctz_image-toolkit.exe" -Destination "lctz_image-toolkit-windows-x64.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lctz_image-toolkit-windows-x64
          path: lctz_image-toolkit-windows-x64.exe

  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
            target_arch: x86_64
          - os: macos-14
            arch: arm64
            target_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --target-arch "${{ matrix.target_arch }}" \
            --name "lctz_image-toolkit" \
            lctz_image_toolkit.py

      - name: Ad-hoc sign app
        run: |
          codesign --force --deep --sign - "dist/lctz_image-toolkit.app"

      - name: Create DMG
        run: |
          mkdir -p dmg-root
          cp -R "dist/lctz_image-toolkit.app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "LCTZ Image Toolkit" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "lctz_image-toolkit-macos-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lctz_image-toolkit-macos-${{ matrix.arch }}
          path: lctz_image-toolkit-macos-${{ matrix.arch }}.dmg

  release:
    name: Create GitHub Release
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set release tag
        id: release_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: LCTZ Image Toolkit ${{ steps.release_tag.outputs.tag }}
          body: |
            LCTZ Image Toolkit ${{ steps.release_tag.outputs.tag }}

            Downloads:
            - Windows x64: lctz_image-toolkit-windows-x64.exe
            - macOS Intel: lctz_image-toolkit-macos-x86_64.dmg
            - macOS Apple Silicon: lctz_image-toolkit-macos-arm64.dmg

            The macOS builds use ad-hoc signing.
          files: |
            artifacts/lctz_image-toolkit-windows-x64/lctz_image-toolkit-windows-x64.exe
            artifacts/lctz_image-toolkit-macos-x86_64/lctz_image-toolkit-macos-x86_64.dmg
            artifacts/lctz_image-toolkit-macos-arm64/lctz_image-toolkit-macos-arm64.dmg
